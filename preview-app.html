<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Palate — Mobile preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          palate: {
            red: "#FF3008",
            ink: "#111111",
            paper: "#FFFFFF",
            mute: "#6B6B6B",
            line: "#EAEAEA",
            faint: "#F6F6F6",
          },
        },
        letterSpacing: { tightest: "-0.04em" },
      },
    },
  };
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif; }
  .phone-shell {
    width: 390px; height: 844px;
    background: #1a1a1a;
    border-radius: 55px;
    padding: 10px;
    box-shadow: 0 50px 100px -20px rgba(0,0,0,0.45), 0 30px 60px -30px rgba(0,0,0,0.5);
  }
  .phone-screen {
    position: relative;
    width: 100%; height: 100%;
    background: #fff;
    border-radius: 45px;
    overflow: hidden;
  }
  .notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 32px; background: #000; border-radius: 999px; z-index: 50;
  }
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 54px; z-index: 40;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px 0; font-weight: 600; font-size: 14px; color: #111;
    pointer-events: none;
  }
  .screen-body { position: absolute; inset: 0; padding-top: 54px; }
  .scroll { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll::-webkit-scrollbar { width: 0; }

  .nav-btn { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; font-size: 13px; color: #444; cursor: pointer; }
  .nav-btn:hover { background: #ECECEC; color: #111; }
  .nav-btn.active { background: #111; color: #fff; }
  .nav-group-title { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 1px; padding: 12px 12px 4px; }

  .btn-primary { background: #FF3008; color: #fff; height: 52px; border-radius: 999px; font-weight: 600; font-size: 16px; width: 100%; transition: opacity .1s; }
  .btn-primary:active, .btn-primary:hover { opacity: .85; }
  .btn-secondary { background: #111; color: #fff; height: 52px; border-radius: 999px; font-weight: 600; font-size: 16px; width: 100%; }
  .btn-ghost { background: transparent; color: #111; height: 52px; border-radius: 999px; font-weight: 600; font-size: 16px; width: 100%; border: 1px solid #EAEAEA; }
  .btn-danger { background: transparent; color: #FF3008; height: 52px; border-radius: 999px; font-weight: 600; font-size: 16px; width: 100%; border: 1px solid #FF3008; }

  .input { height: 54px; border: 1px solid #EAEAEA; border-radius: 14px; padding: 0 16px; font-size: 16px; width: 100%; }
  .input:focus { outline: none; border-color: #FF3008; box-shadow: 0 0 0 3px rgba(255,48,8,.15); }

  .micro { font-size: 11px; font-weight: 600; color: #6B6B6B; letter-spacing: 1.5px; text-transform: uppercase; }

  .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 84px; border-top: 1px solid #EAEAEA; background: #fff; padding-top: 10px; display: flex; justify-content: space-around; align-items: flex-start; z-index: 30; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px 12px; border-radius: 10px; }
  .tab .glyph { font-size: 22px; line-height: 1; }
  .tab .label { font-size: 11px; font-weight: 600; }
  .tab.active { color: #FF3008; }
  .tab:not(.active) { color: #6B6B6B; }

  .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 60; }
  .modal-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 28px 28px 0 0; padding: 28px 24px 36px; z-index: 70; box-shadow: 0 -20px 40px -10px rgba(0,0,0,.25); }

  .visit-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid #EAEAEA; }
  .visit-dot { width: 10px; height: 10px; border-radius: 5px; background: #FF3008; }

  .switch { width: 50px; height: 30px; border-radius: 999px; background: #EAEAEA; position: relative; cursor: pointer; transition: background .15s; }
  .switch.on { background: #FFCFC5; }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; border-radius: 50%; background: #fff; transition: transform .15s, background .15s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
  .switch.on::after { transform: translateX(20px); background: #FF3008; }
</style>
</head>
<body class="bg-neutral-100 min-h-screen text-palate-ink">
  <div class="max-w-6xl mx-auto px-6 py-10 flex gap-10">
    <!-- LEFT: screen index -->
    <aside class="w-[260px] shrink-0">
      <div class="flex items-center gap-2">
        <svg width="28" height="28" viewBox="0 0 64 64">
          <rect width="64" height="64" rx="16" fill="#FF3008"/>
          <path d="M22 18 V52" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
          <path d="M22 22 a10 10 0 1 1 0 20 H22" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <h1 class="text-xl font-bold tracking-tightest">palate · preview</h1>
      </div>
      <p class="text-sm text-palate-mute mt-2 leading-relaxed">
        Tap any screen, or use the buttons inside the phone to walk through the real flow.
      </p>

      <div class="nav-group-title">Auth</div>
      <button class="nav-btn w-full text-left" data-go="sign-in">Sign in</button>
      <button class="nav-btn w-full text-left" data-go="sign-in-code">Enter code</button>

      <div class="nav-group-title">Onboarding</div>
      <button class="nav-btn w-full text-left" data-go="ob-welcome">Welcome</button>
      <button class="nav-btn w-full text-left" data-go="ob-why">Why location</button>
      <button class="nav-btn w-full text-left" data-go="ob-perm">Permission</button>
      <button class="nav-btn w-full text-left" data-go="ob-privacy">Privacy</button>

      <div class="nav-group-title">Tabs</div>
      <button class="nav-btn w-full text-left" data-go="home">Home</button>
      <button class="nav-btn w-full text-left" data-go="add">Add visit</button>
      <button class="nav-btn w-full text-left" data-go="wrapped">Wrapped</button>
      <button class="nav-btn w-full text-left" data-go="settings">Settings</button>

      <div class="nav-group-title">Modals</div>
      <button class="nav-btn w-full text-left" data-go="confirm">Confirm visit</button>
      <button class="nav-btn w-full text-left" data-go="confirm-alts">Wrong place</button>

      <div class="mt-8 p-4 rounded-xl bg-white border border-palate-line">
        <div class="text-sm font-semibold">Note</div>
        <p class="text-xs text-palate-mute mt-1 leading-relaxed">
          This is a static visual preview. The real Expo app uses these exact screens with live Supabase + Google Places data.
        </p>
      </div>
    </aside>

    <!-- RIGHT: phone -->
    <div class="flex-1 flex justify-center pt-4">
      <div class="phone-shell">
        <div class="phone-screen">
          <div class="notch"></div>
          <div class="status-bar" id="statusbar">
            <span>9:41</span>
            <span>●●● 100%</span>
          </div>
          <div class="screen-body" id="screen"></div>
        </div>
      </div>
    </div>
  </div>

<script>
// ============================================================
// Screens
// ============================================================
const Logo = (size = 56) => `
  <svg width="${size}" height="${size}" viewBox="0 0 64 64">
    <rect width="64" height="64" rx="16" fill="#FF3008"/>
    <path d="M22 18 V52" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <path d="M22 22 a10 10 0 1 1 0 20 H22" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>`;

const Wordmark = `
  <div class="flex items-center gap-2">
    ${Logo(28)}
    <span class="text-xl font-bold tracking-tightest">palate</span>
  </div>`;

const TabBar = (active) => {
  const tabs = [
    { key: "home", glyph: "•", label: "Home", bold: false },
    { key: "add", glyph: "+", label: "Add", bold: true },
    { key: "wrapped", glyph: "✦", label: "Wrapped", bold: false },
    { key: "settings", glyph: "⚙", label: "Settings", bold: false },
  ];
  return `<nav class="tab-bar">
    ${tabs.map((t) => `
      <div class="tab ${active === t.key ? "active" : ""}" onclick="go('${t.key}')">
        <span class="glyph" style="${t.bold ? "font-size:28px;font-weight:800;" : ""}">${t.glyph}</span>
        <span class="label">${t.label}</span>
      </div>
    `).join("")}
  </nav>`;
};

// --- AUTH ---
const SignIn = () => `
  <div class="scroll px-6 pt-8 pb-6 flex flex-col" style="height:100%;">
    <div class="flex flex-col items-center mt-4">
      ${Logo(56)}
      <h1 class="text-4xl font-extrabold tracking-tightest mt-5">Welcome to Palate</h1>
      <p class="text-base text-palate-mute mt-2">See what you actually eat.</p>
    </div>
    <div class="mt-12 space-y-4">
      <div>
        <div class="micro mb-2">Email</div>
        <input class="input" placeholder="you@email.com" />
      </div>
      <button class="btn-primary" onclick="go('sign-in-code')">Send code</button>
    </div>
    <div class="mt-auto text-center">
      ${Wordmark}
      <p class="text-xs text-palate-mute mt-2">By signing in you agree to our Terms and Privacy.</p>
    </div>
  </div>`;

const SignInCode = () => `
  <div class="scroll px-6 pt-8 pb-6 flex flex-col" style="height:100%;">
    <div class="flex flex-col items-center mt-4">
      ${Logo(56)}
      <h1 class="text-4xl font-extrabold tracking-tightest mt-5">Welcome to Palate</h1>
      <p class="text-base text-palate-mute mt-2">Check your email for a 6-digit code.</p>
    </div>
    <div class="mt-12 space-y-4">
      <div>
        <div class="micro mb-2">6-digit code</div>
        <input class="input text-center" style="letter-spacing:8px;font-size:20px;" placeholder="123456" />
      </div>
      <button class="btn-primary" onclick="go('ob-welcome')">Sign in</button>
      <button class="btn-ghost" onclick="go('sign-in')">Use a different email</button>
    </div>
    <div class="mt-auto text-center text-xs text-palate-mute">${Wordmark}</div>
  </div>`;

// --- ONBOARDING ---
const ObWelcome = () => `
  <div class="flex flex-col" style="height:100%;">
    <div class="px-6 pt-12 flex-1">
      ${Logo(64)}
      <h1 class="text-4xl font-extrabold tracking-tightest mt-8">See what you actually eat.</h1>
      <p class="text-base text-palate-mute leading-relaxed mt-4">
        Palate quietly notices when you're at a restaurant and asks if you're eating there.
        Every Sunday you get a beautiful Wrapped of your real eating week.
      </p>
    </div>
    <div class="px-6 pb-8">
      <button class="btn-primary" onclick="go('ob-why')">Get started</button>
    </div>
  </div>`;

const ObWhy = () => `
  <div class="flex flex-col" style="height:100%;">
    <div class="px-6 pt-12 flex-1 scroll">
      <h1 class="text-4xl font-extrabold tracking-tightest">Why location?</h1>
      <div class="mt-6 space-y-6">
        <div class="flex gap-4"><div class="text-2xl">📍</div><div class="flex-1 leading-relaxed">Palate uses your location only to detect nearby restaurants when the app is open.</div></div>
        <div class="flex gap-4"><div class="text-2xl">🙋</div><div class="flex-1 leading-relaxed">We always ask before we save a visit. You can say no, or pick the right place.</div></div>
        <div class="flex gap-4"><div class="text-2xl">🔕</div><div class="flex-1 leading-relaxed">Pause tracking anytime in Settings — your past visits stay, nothing new is recorded.</div></div>
        <div class="flex gap-4"><div class="text-2xl">🗑️</div><div class="flex-1 leading-relaxed">Delete a single visit, your whole history, or your entire account whenever you want.</div></div>
      </div>
    </div>
    <div class="px-6 pb-8 pt-4">
      <button class="btn-primary" onclick="go('ob-perm')">Continue</button>
    </div>
  </div>`;

const ObPerm = () => `
  <div class="flex flex-col" style="height:100%;">
    <div class="px-6 pt-12 flex-1 scroll">
      <h1 class="text-4xl font-extrabold tracking-tightest">Allow location</h1>
      <p class="text-base text-palate-mute leading-relaxed mt-4">
        When you tap "Allow," iOS will ask if Palate can use your location. Choose
        <strong>"While Using the App."</strong>
      </p>
      <div class="mt-8 rounded-2xl border border-palate-line bg-palate-faint p-5">
        <div class="font-semibold text-lg">What we'll do with it</div>
        <p class="text-palate-mute leading-relaxed mt-2">
          When you ask Palate to check, we look up nearby restaurants and ask you which one you're at — if any. We never sell your location.
        </p>
      </div>
    </div>
    <div class="px-6 pb-8 pt-4 space-y-3">
      <button class="btn-primary" onclick="showOSPerm()">Allow location</button>
      <button class="btn-ghost" onclick="go('ob-privacy')">Skip for now</button>
    </div>
  </div>`;

const ObPrivacy = () => `
  <div class="flex flex-col" style="height:100%;">
    <div class="px-6 pt-12 flex-1 scroll">
      <h1 class="text-4xl font-extrabold tracking-tightest">Your data, your call.</h1>
      <p class="text-base text-palate-mute leading-relaxed mt-4">
        Palate is for you. There's no public profile, no friends, no comments.
        We don't sell your data and we don't show ads.
      </p>
      <div class="mt-8 space-y-5">
        <div><div class="font-semibold text-lg">Pause anytime</div><div class="text-palate-mute mt-1">Toggle off location tracking from Settings.</div></div>
        <div><div class="font-semibold text-lg">Delete what you want</div><div class="text-palate-mute mt-1">Single visits, a week, or everything.</div></div>
        <div><div class="font-semibold text-lg">No selling, ever</div><div class="text-palate-mute mt-1">Restaurants don't see your name or email.</div></div>
      </div>
    </div>
    <div class="px-6 pb-8 pt-4">
      <button class="btn-primary" onclick="go('home')">Let's eat</button>
    </div>
  </div>`;

// --- TABS ---
const Home = () => `
  <div class="scroll" style="height:100%;padding-bottom:100px;">
    <div class="px-6 pt-6">
      ${Wordmark}
      <div class="mt-8 rounded-3xl bg-palate-faint p-6">
        <div class="micro">RIGHT NOW</div>
        <div class="text-2xl font-bold tracking-tightest mt-2">Are you eating somewhere?</div>
        <p class="text-palate-mute mt-2 leading-relaxed">Tap to check what's around you. We'll ask before saving anything.</p>
        <div class="mt-5"><button class="btn-primary" onclick="go('confirm')">Check now</button></div>
      </div>
      <div class="mt-10">
        <div class="text-2xl font-bold tracking-tightest">Recent</div>
        <div class="mt-3">
          ${visitRow("Sweetgreen", "Tue, Apr 28 · 12:34 PM · Restaurant")}
          ${visitRow("Joe & The Juice", "Tue, Apr 28 · 9:02 AM · Cafe")}
          ${visitRow("Joe's Pizza", "Mon, Apr 27 · 7:48 PM · Restaurant")}
          ${visitRow("Blue Bottle", "Mon, Apr 27 · 8:15 AM · Cafe")}
          ${visitRow("Chipotle", "Sun, Apr 26 · 1:10 PM · Meal Takeaway")}
        </div>
      </div>
    </div>
  </div>
  ${TabBar("home")}`;

const visitRow = (name, sub) => `
  <div class="visit-row">
    <div class="visit-dot"></div>
    <div class="flex-1">
      <div class="font-semibold text-base">${name}</div>
      <div class="text-sm text-palate-mute mt-0.5">${sub}</div>
    </div>
  </div>`;

const Add = () => `
  <div class="scroll" style="height:100%;padding-bottom:100px;">
    <div class="px-6 pt-6">
      <div class="text-2xl font-bold tracking-tightest">Add a visit</div>
      <div class="text-palate-mute mt-1">Search for a place. We'll save it as today's visit.</div>
      <div class="mt-5"><input class="input" placeholder="Search restaurants, cafés…" value="sweet" oninput="updateAdd(this.value)"/></div>
      <div class="mt-3"><button class="btn-primary" onclick="document.getElementById('addResults').classList.remove('hidden')">Search</button></div>
      <div id="addResults" class="mt-6">
        ${addResultRow("Sweetgreen", "1140 Broadway")}
        ${addResultRow("Sweetcatch", "245 W 14th St")}
        ${addResultRow("Sweet Chick", "164 Bleecker St")}
      </div>
    </div>
  </div>
  ${TabBar("add")}`;

const addResultRow = (name, address) => `
  <div class="visit-row" onclick="alert('Saved “${name}”')" style="cursor:pointer;">
    <div class="flex-1">
      <div class="font-semibold text-base">${name}</div>
      <div class="text-sm text-palate-mute mt-0.5">${address}</div>
    </div>
    <div style="font-size:28px;color:#FF3008;font-weight:700;margin-left:12px;">+</div>
  </div>`;

const Wrapped = () => `
  <div class="scroll" style="height:100%;padding-bottom:100px;">
    <div class="px-6 pt-6">
      <div class="text-2xl font-bold tracking-tightest">Your Wrapped</div>
      <div class="text-palate-mute mt-1">A look at your real eating week.</div>
      <div class="mt-5">
        ${WrappedCardEl}
      </div>
      <div class="mt-5"><button class="btn-primary" onclick="alert('Share sheet would open with the rendered card image.')">Share</button></div>
      <div class="mt-3"><button class="btn-ghost" onclick="go('wrapped')">Refresh</button></div>
    </div>
  </div>
  ${TabBar("wrapped")}`;

const WrappedCardEl = `
  <div class="relative rounded-3xl overflow-hidden" style="background:linear-gradient(135deg,#1A1A1A,#0E0E0E);color:#fff;padding:24px;">
    <div style="position:absolute;top:-80px;right:-60px;width:220px;height:220px;border-radius:9999px;background:#FF3008;opacity:.3;filter:blur(40px);"></div>
    <div class="relative">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div style="width:32px;height:32px;border-radius:10px;background:#FF3008;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;">p</div>
          <span style="color:rgba(255,255,255,.7);font-size:13px;">Apr 22 — Apr 28</span>
        </div>
      </div>
      <div style="color:rgba(255,255,255,.6);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-top:24px;">You are</div>
      <div style="color:#FF3008;font-size:32px;font-weight:800;letter-spacing:-0.6px;margin-top:4px;">The Fast Casual Regular</div>
      <div style="display:flex;gap:10px;margin-top:24px;">
        ${stat("12","visits")}${stat("7","places")}${stat("42%","repeat")}
      </div>
      <div style="color:rgba(255,255,255,.6);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-top:24px;">Top spots</div>
      <div style="margin-top:8px;">
        ${topRow(1,"Sweetgreen",4)}
        ${topRow(2,"Joe & The Juice",2)}
        ${topRow(3,"Joe's Pizza",2)}
      </div>
      <div style="color:rgba(255,255,255,.5);margin-top:24px;font-size:12px;">palate.app</div>
    </div>
  </div>`;
function stat(v,l){return `<div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:14px;"><div style="color:#fff;font-size:26px;font-weight:800;">${v}</div><div style="color:rgba(255,255,255,.6);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;">${l}</div></div>`;}
function topRow(n,name,c){return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.1);"><span style="color:#fff;"><span style="color:rgba(255,255,255,.5);">${n}</span>  ${name}</span><span style="color:rgba(255,255,255,.6);">×${c}</span></div>`;}

const Settings = () => `
  <div class="scroll" style="height:100%;padding-bottom:100px;">
    <div class="px-6 pt-6">
      <div class="text-2xl font-bold tracking-tightest">Settings</div>
      <div class="text-sm text-palate-mute mt-1">Signed in as you@example.com</div>

      <div class="mt-7">
        <div class="micro">PRIVACY</div>
        <div class="mt-2 flex items-center justify-between py-3 border-b border-palate-line">
          <div class="text-base">Location tracking</div>
          <div class="switch on" id="trackingSwitch" onclick="toggleSwitch(this)"></div>
        </div>
        <p class="text-sm text-palate-mute mt-2 leading-relaxed">
          When off, Palate stops checking your location. Past visits stay. You can still add visits manually.
        </p>
      </div>

      <div class="mt-7">
        <div class="micro">WRAPPED</div>
        <div class="mt-2"><button class="btn-ghost" onclick="alert('Would generate this week\\'s Wrapped.')">Generate this week's Wrapped</button></div>
      </div>

      <div class="mt-7">
        <div class="micro">YOUR DATA</div>
        <div class="mt-2 space-y-3">
          <button class="btn-ghost" onclick="confirm('Delete all visit history? This cannot be undone.')">Delete all visit history</button>
          <button class="btn-danger" onclick="confirm('Delete account forever?')">Delete my account</button>
        </div>
      </div>

      <div class="mt-7">
        <div class="micro">ACCOUNT</div>
        <div class="mt-2"><button class="btn-ghost" onclick="go('sign-in')">Sign out</button></div>
      </div>

      <div class="mt-7 mb-4">
        <div class="micro">ABOUT</div>
        <p class="text-sm text-palate-mute mt-2">Palate v0.1 — built for you, no ads, no selling, no social anything.</p>
      </div>
    </div>
  </div>
  ${TabBar("settings")}`;

// --- MODAL: confirm visit ---
const Confirm = () => `
  ${HomeUnderlay}
  <div class="modal-backdrop" onclick="go('home')"></div>
  <div class="modal-sheet">
    <div class="micro">WE THINK YOU'RE AT</div>
    <div class="text-3xl font-extrabold tracking-tightest mt-2">Sweetgreen</div>
    <div class="text-palate-mute mt-1">1140 Broadway, New York</div>
    <div class="mt-6 text-base">Are you eating here?</div>
    <div class="mt-4 space-y-3">
      <button class="btn-primary" onclick="go('home'); setTimeout(() => alert('Saved Sweetgreen to your week.'), 200);">Yes, save it</button>
      <button class="btn-ghost" onclick="go('confirm-alts')">Wrong restaurant</button>
      <button class="btn-ghost" onclick="go('home')">Not right now</button>
    </div>
  </div>`;

const ConfirmAlts = () => `
  ${HomeUnderlay}
  <div class="modal-backdrop"></div>
  <div class="modal-sheet" style="bottom:0;padding-bottom:24px;">
    <div class="micro">WRONG PLACE</div>
    <div class="text-3xl font-extrabold tracking-tightest mt-2">Pick the right one</div>
    <div class="mt-4">
      ${altRow("Joe & The Juice","1142 Broadway")}
      ${altRow("Pret A Manger","1133 Broadway")}
      ${altRow("Just Salad","1156 Broadway")}
      ${altRow("Cava","1180 Broadway")}
    </div>
    <div class="mt-4"><button class="btn-ghost" onclick="go('home')">Cancel</button></div>
  </div>`;

const altRow = (name, addr) => `
  <div class="visit-row" onclick="go('home'); setTimeout(() => alert('Saved “${name}” to your week.'), 200);" style="cursor:pointer;">
    <div class="flex-1"><div class="font-semibold">${name}</div><div class="text-sm text-palate-mute mt-0.5">${addr}</div></div>
    <div style="color:#FF3008;font-weight:700;">Pick</div>
  </div>`;

const HomeUnderlay = `
  <div class="scroll" style="height:100%;padding-bottom:100px;">
    <div class="px-6 pt-6">
      ${Wordmark}
      <div class="mt-8 rounded-3xl bg-palate-faint p-6">
        <div class="micro">RIGHT NOW</div>
        <div class="text-2xl font-bold tracking-tightest mt-2">Are you eating somewhere?</div>
        <p class="text-palate-mute mt-2 leading-relaxed">Tap to check what's around you. We'll ask before saving anything.</p>
      </div>
    </div>
  </div>
  ${TabBar("home")}`;

// ============================================================
// State + render
// ============================================================
const screens = {
  "sign-in": SignIn,
  "sign-in-code": SignInCode,
  "ob-welcome": ObWelcome,
  "ob-why": ObWhy,
  "ob-perm": ObPerm,
  "ob-privacy": ObPrivacy,
  home: Home,
  add: Add,
  wrapped: Wrapped,
  settings: Settings,
  confirm: Confirm,
  "confirm-alts": ConfirmAlts,
};

let current = "sign-in";
function go(name) {
  current = name;
  render();
  document.querySelectorAll("[data-go]").forEach((b) => {
    b.classList.toggle("active", b.dataset.go === name);
  });
}
function render() {
  document.getElementById("screen").innerHTML = screens[current]();
}
document.querySelectorAll("[data-go]").forEach((b) => {
  b.addEventListener("click", () => go(b.dataset.go));
});

// helpers used by inline handlers
function toggleSwitch(el) { el.classList.toggle("on"); }
function showOSPerm() {
  if (confirm("iOS would now ask:\\n\\n\"Allow Palate to use your location?\"\\n\\nTap OK to simulate granting.")) {
    go("ob-privacy");
  }
}
function updateAdd(v) { /* no-op for now */ }

go("sign-in");
</script>
